<!DOCTYPE html>
<html lang="th" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inbound Scan - Roastery Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#271310", "on-primary": "#ffffff",
                        surface: "#f4faff", "on-surface": "#111d23", "on-surface-variant": "#504442",
                        "surface-container-lowest": "#ffffff", "surface-container-low": "#e9f6fd",
                        "outline-variant": "#d3c3c0", "secondary-container": "#e1e1c9",
                        error: "#ba1a1a"
                    },
                    fontFamily: { sans: ['Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        ::-webkit-scrollbar { display: none; }
        .scan-flash { animation: flash 0.3s; }
        @keyframes flash { 0% { background-color: rgba(76, 175, 80, 0.5); } 100% { background-color: transparent; } }
    </style>
</head>
<body class="bg-surface text-on-surface font-sans min-h-screen flex flex-col pb-24 antialiased">

    <header class="w-full top-0 sticky border-b border-outline-variant bg-surface flex items-center px-4 h-14 z-40">
        <a href="https://liff.line.me/2010761292-fHq83HiZ" class="text-primary hover:bg-surface-container-low p-2 rounded-full -ml-2">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 id="headerTitle" class="text-lg font-bold text-primary flex-1 text-center pr-8">รับเข้า: แบบไม่อ้างอิงใบงาน</h1>
    </header>

    <main class="p-4 flex flex-col gap-4 z-10">
        <section class="flex flex-col gap-2">
            <div class="flex justify-between items-end">
                <h3 class="text-xs font-bold text-on-surface-variant uppercase tracking-wider">โหมดการสแกน</h3>
                <span id="scanCounter" class="text-xs font-bold bg-secondary-container text-primary px-2 py-1 rounded">สแกนแล้ว: 0</span>
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <div id="box-location" onclick="setScanMode('location')" class="border-2 border-primary bg-surface-container-low rounded-lg p-3 flex flex-col relative cursor-pointer transition-all">
                    <span class="text-[10px] text-primary uppercase font-bold">Location</span>
                    <span id="val-location" class="font-mono font-bold text-primary text-sm mt-1 truncate">-</span>
                </div>
                <div id="box-qr" onclick="setScanMode('qr')" class="border-2 border-outline-variant bg-surface-container-lowest rounded-lg p-3 flex flex-col relative cursor-pointer transition-all opacity-60">
                    <span class="text-[10px] text-on-surface-variant uppercase font-bold">QR Code</span>
                    <span id="val-qr" class="font-mono font-bold text-on-surface-variant text-sm mt-1 truncate">-</span>
                </div>
            </div>

            <!-- กล่องแสดงภาพจากกล้องสด -->
            <div id="videoContainer" class="hidden relative w-full bg-black rounded-lg overflow-hidden mt-2" style="aspect-ratio: 4/3;">
                <video id="videoElement" class="w-full h-full object-cover"></video>
                <div class="absolute inset-0 border-2 border-primary/50 pointer-events-none z-10 m-6 rounded-lg shadow-[0_0_0_4000px_rgba(0,0,0,0.5)]"></div>
                <button onclick="stopLiveCamera()" class="absolute top-2 right-2 bg-error text-white px-3 py-1 rounded-lg text-sm font-bold z-20">ปิดกล้อง</button>
            </div>

            <button id="btnStartCamera" onclick="startLiveCamera()" class="w-full bg-primary text-on-primary font-bold py-3 rounded-lg flex items-center justify-center gap-2 mt-2">
                <span class="material-symbols-outlined text-2xl">qr_code_scanner</span>
                <span id="textScanMain">เปิดกล้องสแกนต่อเนื่อง</span>
            </button>
        </section>

        <section class="mt-2">
            <h3 class="text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">ประวัติการสแกน</h3>
            <div id="scanLogContainer" class="flex flex-col gap-2">
                <div id="emptyLog" class="text-center py-6 text-on-surface-variant text-sm border rounded-lg">ยังไม่มีข้อมูลการสแกน</div>
            </div>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 w-full p-4 bg-surface border-t z-40">
        <button id="btnSync" onclick="handleSync()" class="w-full bg-primary text-on-primary text-lg font-bold py-4 rounded-xl flex justify-center items-center gap-2">
            <span class="material-symbols-outlined">cloud_sync</span> บันทึกและอัปเดต (0)
        </button>
    </div>

    <script>
        // 📌📌📌 เอา URL ของ Google Apps Script มาวางในบรรทัดนี้ครับ 📌📌📌
        const GOOGLE_API_URL = "https://script.google.com/d/19H_KcLiXUi6H6zZy3ySRDs6CvMZvxyqvhzcUzGQSBhUPmBTl41ASBvLX/edit?usp=drive_link"; 

        let activeScanMode = "location"; 
        let scannedItems = []; 
        let codeReader = new ZXing.BrowserMultiFormatReader();
        let isCameraRunning = false;
        let lastScannedText = "";
        let lastScanTime = 0;

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } catch(e) {}
        }

        function setScanMode(mode) {
            activeScanMode = mode;
            // ... สลับดีไซน์ ...
            const boxLoc = document.getElementById('box-location');
            const boxQr = document.getElementById('box-qr');
            if(mode === 'location') {
                boxLoc.className = "border-2 border-primary bg-surface-container-low rounded-lg p-3";
                boxQr.className = "border-2 border-outline-variant bg-surface-container-lowest rounded-lg p-3 opacity-60";
            } else {
                boxQr.className = "border-2 border-primary bg-surface-container-low rounded-lg p-3";
                boxLoc.className = "border-2 border-outline-variant bg-surface-container-lowest rounded-lg p-3 opacity-60";
            }
        }

        async function startLiveCamera() {
            document.getElementById('videoContainer').classList.remove('hidden');
            document.getElementById('btnStartCamera').classList.add('hidden');
            try {
                isCameraRunning = true;
                await codeReader.decodeFromConstraints({ video: { facingMode: "environment" } }, 'videoElement', (result, err) => {
                    if (result) {
                        const scannedText = result.getText();
                        const now = Date.now();
                        if (scannedText !== lastScannedText || (now - lastScanTime) > 2000) {
                            lastScannedText = scannedText; lastScanTime = now;
                            playBeep(); 
                            
                            const videoArea = document.getElementById('videoContainer');
                            videoArea.classList.add('scan-flash');
                            setTimeout(() => videoArea.classList.remove('scan-flash'), 300);

                            processScannedData(scannedText);
                        }
                    }
                });
            } catch (err) {
                alert("ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตให้ใช้งานกล้องครับ");
                stopLiveCamera();
            }
        }

        function stopLiveCamera() {
            codeReader.reset();
            isCameraRunning = false;
            document.getElementById('videoContainer').classList.add('hidden');
            document.getElementById('btnStartCamera').classList.remove('hidden');
        }

        function processScannedData(scannedText) {
            if (activeScanMode === 'location') {
                document.getElementById('val-location').innerText = scannedText;
                setScanMode('qr'); 
            } else {
                let loc = document.getElementById('val-location').innerText;
                if (loc === "-" || loc === "") {
                    document.getElementById('val-location').innerText = scannedText;
                    setScanMode('qr'); return;
                }
                document.getElementById('val-qr').innerText = scannedText;
                scannedItems.push({ qrLabel: scannedText, location: loc, actualWeight: 60 });
                updateUI(); addLog(loc, scannedText);
            }
        }

        function updateUI() {
            document.getElementById('scanCounter').innerText = "สแกนแล้ว: " + scannedItems.length;
            document.getElementById('btnSync').innerHTML = `<span class="material-symbols-outlined">cloud_sync</span> บันทึกและอัปเดต (${scannedItems.length})`;
        }

        function addLog(loc, qrCode) {
            const container = document.getElementById('scanLogContainer');
            const emptyLog = document.getElementById('emptyLog');
            if (emptyLog) emptyLog.remove();
            const time = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            const logHtml = `<div class="bg-surface-container-lowest border-l-4 border-primary p-3 flex justify-between shadow-sm mb-2"><div class="flex flex-col"><span class="text-sm font-bold">${qrCode}</span><span class="text-[10px]">Location: ${loc}</span></div><span class="text-xs bg-surface-container-low px-2 py-1 rounded">${time}</span></div>`;
            container.insertAdjacentHTML('afterbegin', logHtml);
        }

        function handleSync() {
            if (scannedItems.length === 0) return alert("กรุณาสแกนอย่างน้อย 1 รายการครับ");
            if(isCameraRunning) stopLiveCamera();

            const btn = document.getElementById("btnSync");
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> กำลังบันทึกข้อมูล...';
            btn.disabled = true;

            const payload = { workOrderId: currentWoId, itemCode: "Brazil Santos", items: scannedItems };

            fetch(GOOGLE_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                alert("บันทึกสำเร็จ!");
                // บันทึกเสร็จแล้ว เด้งกลับหน้าแรก LIFF ทันที
                window.location.href = "https://liff.line.me/2010761292-fHq83HiZ"; 
            })
            .catch(err => {
                alert("ส่งข้อมูลแล้ว!");
                window.location.href = "https://liff.line.me/2010761292-fHq83HiZ";
            });
        }
    </script>
</body>
</html>
