<!DOCTYPE html>
<html lang="th" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roastery Ops - Staff App</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#271310", "on-primary": "#ffffff", "primary-container": "#3e2723",
                        surface: "#f4faff", "on-surface": "#111d23", "on-surface-variant": "#504442",
                        "surface-container-lowest": "#ffffff", "surface-container-low": "#e9f6fd",
                        "surface-container-high": "#ddeaf2", "outline-variant": "#d3c3c0",
                        "secondary-container": "#e1e1c9", "on-secondary-container": "#636451",
                        error: "#ba1a1a", "error-container": "#ffdad6"
                    },
                    fontFamily: { sans: ['Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        ::-webkit-scrollbar { display: none; }
        
        /* สไตล์สำหรับการ์ดใบงาน */
        .wo-card {
            background-color: var(--color-surface-container-lowest);
            border-radius: 1rem;
            border: 1px solid var(--color-outline-variant);
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
        }
        .wo-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: var(--color-primary);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-sans min-h-screen flex flex-col pb-20 antialiased">

    <header class="w-full top-0 sticky bg-surface flex items-center justify-between px-4 h-14 z-30 shadow-sm border-b border-outline-variant">
        <h1 class="text-xl font-bold tracking-tighter text-primary">ROASTERY OPS</h1>
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary bg-surface-container-high p-1.5 rounded-full cursor-pointer hover:bg-outline-variant transition-colors">notifications</span>
        </div>
    </header>

    <main class="p-4 flex flex-col gap-6 w-full max-w-lg mx-auto z-10">
        
        <section class="bg-primary text-on-primary rounded-2xl p-4 shadow-md flex justify-between items-center relative overflow-hidden">
             <div class="absolute right-[-20px] top-[-20px] opacity-10">
                <span class="material-symbols-outlined" style="font-size: 100px;">inventory_2</span>
            </div>
            <div>
                <p class="text-xs font-medium opacity-80 uppercase tracking-wider">ภาพรวมวันนี้</p>
                <h2 class="text-2xl font-bold mt-1" id="summaryDate">กำลังโหลด...</h2>
            </div>
            <div class="text-right">
                 <p class="text-[10px] font-medium opacity-80 uppercase tracking-wider mb-1">สถานะ</p>
                 <span class="bg-on-primary text-primary text-[10px] font-bold px-2 py-1 rounded-full uppercase">ออนไลน์</span>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-sm font-bold text-on-surface-variant uppercase flex items-center gap-1">
                    <span class="material-symbols-outlined text-[18px]">assignment</span> ใบงานที่กำลังดำเนินการ
                </h2>
                <button onclick="loadWorkOrders()" class="text-primary hover:bg-surface-container-low p-1 rounded-full active:scale-90 transition-transform">
                    <span class="material-symbols-outlined text-[20px]">refresh</span>
                </button>
            </div>
            
            <div id="woContainer" class="flex flex-col gap-3">
                <div class="text-center py-8 text-on-surface-variant animate-pulse font-bold text-sm bg-surface-container-lowest rounded-xl border border-outline-variant">
                    <span class="material-symbols-outlined animate-spin align-middle mr-2">sync</span> กำลังดึงข้อมูลใบงาน...
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-1 py-2 bg-surface border-t border-outline-variant z-40 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        
        <a href="index.html" class="flex flex-col items-center justify-center text-primary w-[25%] active:scale-90 transition-transform">
            <div class="bg-secondary-container px-4 py-1 rounded-full mb-1">
                <span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">home</span>
            </div>
            <span class="text-[10px] font-bold">หน้าแรก</span>
        </a>

        <a href="scanner.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary w-[25%] active:scale-90 transition-transform">
            <div class="px-4 py-1 rounded-full mb-1 hover:bg-surface-container-low">
                <span class="material-symbols-outlined text-[24px]">qr_code_scanner</span>
            </div>
            <span class="text-[10px] font-bold">สแกนรับเข้า</span>
        </a>

        <a href="admin_dashboard.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary w-[25%] active:scale-90 transition-transform">
            <div class="px-4 py-1 rounded-full mb-1 hover:bg-surface-container-low">
                <span class="material-symbols-outlined text-[24px]">manage_accounts</span>
            </div>
            <span class="text-[10px] font-bold">จัดการระบบ</span>
        </a>
        
        <a href="#" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary w-[25%] active:scale-90 transition-transform opacity-50 cursor-not-allowed">
             <div class="px-4 py-1 rounded-full mb-1">
                <span class="material-symbols-outlined text-[24px]">inventory_2</span>
            </div>
            <span class="text-[10px] font-bold">คลังสินค้า</span>
        </a>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzxKRgC-DyvyuRWPP2ibCw64fENrVx7qF4WO6997w4oLFtLnM84z5LAbhghD8o6YKPl/exec";

        document.addEventListener("DOMContentLoaded", () => {
            // ตั้งวันที่
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('summaryDate').innerText = new Date().toLocaleDateString('th-TH', options);
            
            // โหลดข้อมูล
            loadWorkOrders();
        });

        function loadWorkOrders() {
            const container = document.getElementById("woContainer");
            container.innerHTML = `
                <div class="text-center py-8 text-on-surface-variant animate-pulse font-bold text-sm bg-surface-container-lowest rounded-xl border border-outline-variant">
                    <span class="material-symbols-outlined animate-spin align-middle mr-2">sync</span> กำลังดึงข้อมูลใบงาน...
                </div>`;
            
            fetch(API_URL + "?action=getActiveWorkOrders")
                .then(res => res.json())
                .then(res => {
                    if (res.status !== 'success' || !res.data || res.data.length === 0) {
                        container.innerHTML = `
                            <div class="text-center py-10 text-on-surface-variant font-bold bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm flex flex-col items-center gap-2">
                                <span class="material-symbols-outlined text-4xl opacity-50">task</span>
                                ไม่มีใบงานที่รอดำเนินการ
                            </div>`;
                        return;
                    }
                    
                    container.innerHTML = '';
                    res.data.forEach(wo => {
                        // เปลี่ยนดีไซน์เป็นการ์ดแบบแอป
                        let card = `
                        <div class="wo-card">
                            <div class="flex justify-between items-start pl-2">
                                <div>
                                    <span class="text-[9px] font-bold text-on-surface-variant uppercase bg-surface-container-high px-2 py-0.5 rounded-md tracking-wider">${wo.type}</span>
                                    <h3 class="font-mono font-bold text-primary mt-1 text-base leading-none">${wo.woId}</h3>
                                </div>
                                <span class="bg-secondary-container text-on-secondary-container px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider">${wo.status}</span>
                            </div>

                            <div class="pl-2 mt-1">
                                <p class="text-sm font-bold text-primary leading-tight">${wo.item}</p>
                            </div>

                            <div class="flex justify-between items-center mt-2 pt-3 border-t border-outline-variant pl-2">
                                <div>
                                    <p class="text-[9px] font-bold text-on-surface-variant uppercase tracking-wider">ความคืบหน้า (พาเลท)</p>
                                    <p class="text-lg font-mono mt-0.5"><span class="font-bold text-primary">${wo.actual}</span><span class="text-xs text-on-surface-variant font-medium"> / ${wo.limit}</span></p>
                                </div>
                                
                                <a href="scanner.html?wo=${wo.woId}" class="bg-primary text-on-primary px-3 py-1.5 rounded-lg text-xs font-bold active:scale-95 transition-transform flex items-center gap-1 shadow-sm">
                                    <span class="material-symbols-outlined text-[16px]">qr_code_scanner</span> สแกนรับของ
                                </a>
                            </div>
                        </div>`;
                        container.innerHTML += card;
                    });
                })
                .catch(err => {
                    container.innerHTML = `
                        <div class="text-center py-10 text-error font-bold bg-error-container rounded-xl shadow-sm flex flex-col items-center gap-2">
                            <span class="material-symbols-outlined text-4xl">wifi_off</span>
                            ไม่สามารถเชื่อมต่อระบบได้
                        </div>`;
                });
        }
    </script>
</body>
</html>
