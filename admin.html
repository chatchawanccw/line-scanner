<!DOCTYPE html>
<html lang="th" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create Work Order & Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#271310", "on-primary": "#ffffff", "primary-container": "#3e2723", surface: "#f4faff", "on-surface": "#111d23", "on-surface-variant": "#504442", "surface-container-lowest": "#ffffff", "surface-container-low": "#e9f6fd", "outline-variant": "#d3c3c0", error: "#ba1a1a" },
                    fontFamily: { sans: ['Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        /* Animation สำหรับ Popup */
        #registerModalContent { transition: transform 0.2s ease-out, opacity 0.2s ease-out; }
        .modal-open { transform: scale(1) !important; opacity: 1 !important; }
        .modal-closed { transform: scale(0.95); opacity: 0; }
    </style>
</head>
<body class="bg-surface text-on-surface font-sans min-h-screen flex flex-col p-4 antialiased relative">

    <header class="flex items-center mb-6">
        <a href="admin_dashboard.html" class="mr-3 p-2 bg-surface-container-low rounded-full active:scale-95 transition-transform border border-outline-variant flex items-center justify-center text-on-surface-variant">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="text-2xl font-bold tracking-tight text-primary">สร้างใบงานใหม่</h1>
    </header>

    <main class="w-full max-w-md mx-auto bg-surface-container-lowest p-6 rounded-2xl shadow-sm border border-outline-variant z-10">
        <form id="createWorkOrderForm" onsubmit="handleCreateWorkOrder(event)" class="flex flex-col gap-4">
            
            <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-on-surface-variant uppercase">รหัสใบงาน</label>
                <input type="text" id="workId" readonly class="w-full px-3 py-2 bg-surface-container-low border border-outline-variant rounded-lg font-mono font-bold text-primary opacity-80 cursor-not-allowed">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-bold text-on-surface-variant uppercase">ประเภทใบงาน</label>
                    <select id="workType" required class="w-full px-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary">
                        <option value="INBOUND">รับเข้า (Inbound)</option>
                        <option value="ROAST">คั่วกาแฟ (Roast)</option>
                    </select>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-bold text-on-surface-variant uppercase">จำนวนใบงาน (Batch)</label>
                    <input type="number" id="batchCount" value="1" min="1" max="50" required class="w-full px-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary">
                </div>
            </div>

            <div class="flex flex-col gap-1">
                <div class="flex justify-between items-end mb-1">
                    <label class="text-xs font-bold text-on-surface-variant uppercase">ผู้จัดจำหน่าย (Supplier)</label>
                    <button type="button" onclick="openRegisterModal()" class="text-primary bg-surface-container-high border border-outline-variant hover:bg-outline-variant px-2 py-0.5 rounded text-[10px] font-bold flex items-center gap-1 transition-colors active:scale-95 shadow-sm">
                        <span class="material-symbols-outlined text-[14px]">add</span> เพิ่มใหม่
                    </button>
                </div>
                <select id="supplierSelect" onchange="updateItems()" required class="w-full px-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary">
                    <option value="">-- เลือกซัพพลายเออร์ --</option>
                </select>
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-on-surface-variant uppercase">รายการสินค้า (Item)</label>
                <select id="itemSelect" required disabled class="w-full px-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary disabled:opacity-50">
                    <option value="">-- กรุณาเลือกซัพพลายเออร์ก่อน --</option>
                </select>
            </div>

            <div class="flex flex-col gap-1 border border-outline-variant rounded-xl p-3 bg-surface-container-low">
                <label class="text-xs font-bold text-on-surface-variant uppercase text-center mb-1">เป้าหมายการรับเข้า</label>
                <div class="grid grid-cols-2 gap-4">
                     <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-bold text-on-surface-variant uppercase">ยอดรวมทั้งหมด (กระสอบ)</label>
                        <input type="number" id="targetLimit" required min="1" oninput="calculatePallets()" placeholder="เช่น 200" class="w-full px-3 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary text-sm">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-bold text-on-surface-variant uppercase">กระสอบ/พาเลท (QR 1 ดวง)</label>
                        <input type="number" id="bagsPerPallet" required min="1" value="20" oninput="calculatePallets()" class="w-full px-3 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary text-sm">
                    </div>
                </div>
                 <p class="text-xs text-center font-bold text-primary mt-2" id="calcResult">จะสร้างใบงานที่ต้องสแกนทั้งหมด: <span class="text-lg">0</span> พาเลท</p>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-2">
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase">กิโล/กระสอบ</label>
                    <input type="number" id="kgPerBag" value="40" class="w-full px-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary text-sm">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase">Lot Code</label>
                    <input type="text" id="lotCode" placeholder="ระบุเลข Lot (ถ้ามี)" class="w-full px-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary uppercase text-sm">
                </div>
            </div>

            <button type="submit" id="btnSubmitWO" class="w-full bg-primary text-on-primary font-bold py-4 rounded-xl mt-4 shadow-sm active:scale-[0.98] transition-transform flex justify-center items-center gap-2">
                <span class="material-symbols-outlined">add_task</span> ยืนยันสร้างใบงาน
            </button>
        </form>
    </main>

    <div id="registerModal" class="fixed inset-0 bg-on-surface/50 z-50 hidden flex-col justify-center items-center px-4 backdrop-blur-sm">
        <div class="bg-surface w-full max-w-md rounded-2xl p-6 shadow-2xl modal-closed relative" id="registerModalContent">
            
            <button onclick="closeRegisterModal()" class="absolute top-4 right-4 text-on-surface-variant hover:text-error bg-surface-container-low p-1 rounded-full active:scale-90 transition-transform">
                <span class="material-symbols-outlined">close</span>
            </button>
            
            <h3 class="text-lg font-bold text-primary mb-4 flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">app_registration</span> เพิ่มสินค้าเข้าระบบ
            </h3>

            <form id="registerForm" onsubmit="handleRegister(event)" class="flex flex-col gap-4">
                <div class="p-4 bg-surface-container-low rounded-xl border border-outline-variant flex flex-col gap-3">
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-bold text-on-surface-variant uppercase">ชื่อซัพพลายเออร์</label>
                        <input type="text" id="suppName" required placeholder="เช่น บริษัท สยาม คอฟฟี่ เทรด จำกัด" class="w-full px-3 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary text-sm">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-bold text-on-surface-variant uppercase">รหัสย่อ (Code)</label>
                        <input type="text" id="suppCode" required placeholder="เช่น SC" class="w-full px-3 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary uppercase text-sm">
                    </div>
                </div>

                <div class="p-4 bg-surface-container-low rounded-xl border border-outline-variant flex flex-col gap-3">
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-bold text-on-surface-variant uppercase">ชื่อสินค้า / สารกาแฟ</label>
                        <input type="text" id="itemName" required placeholder="เช่น ดอยช้าง Wash" class="w-full px-3 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary text-sm">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-bold text-on-surface-variant uppercase">รหัสสินค้า</label>
                        <input type="text" id="itemCode" required placeholder="เช่น PY" class="w-full px-3 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary uppercase text-sm">
                    </div>
                </div>

                <button type="submit" id="btnSubmitReg" class="w-full bg-primary text-on-primary font-bold py-3 rounded-xl mt-2 shadow-sm active:scale-[0.98] transition-transform flex justify-center items-center gap-2">
                    <span class="material-symbols-outlined text-[20px]">save</span> บันทึกเข้าระบบ
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzxKRgC-DyvyuRWPP2ibCw64fENrVx7qF4WO6997w4oLFtLnM84z5LAbhghD8o6YKPl/exec";
        let supplierDatabase = []; 

        document.addEventListener("DOMContentLoaded", () => {
            loadNextWorkId();
            loadSupplierData(); 
        });

        // ======= ระบบคำนวณจำนวนพาเลทอัตโนมัติ =======
        function calculatePallets() {
            const limit = parseInt(document.getElementById('targetLimit').value) || 0;
            const bagsPerPallet = parseInt(document.getElementById('bagsPerPallet').value) || 1;
            
            if (limit > 0 && bagsPerPallet > 0) {
                // คำนวณจำนวนพาเลท (ปัดขึ้นเสมอเผื่อมีเศษกระสอบ)
                const totalPallets = Math.ceil(limit / bagsPerPallet);
                document.getElementById('calcResult').innerHTML = `จะสร้างใบงานที่ต้องสแกนทั้งหมด: <span class="text-lg font-mono">${totalPallets}</span> พาเลท`;
            } else {
                document.getElementById('calcResult').innerHTML = `จะสร้างใบงานที่ต้องสแกนทั้งหมด: <span class="text-lg font-mono">0</span> พาเลท`;
            }
        }

        // ======= ระบบ Modal =======
        function openRegisterModal() {
            const modal = document.getElementById('registerModal');
            const content = document.getElementById('registerModalContent');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => { content.classList.remove('modal-closed'); content.classList.add('modal-open'); }, 10);
        }

        function closeRegisterModal() {
            const modal = document.getElementById('registerModal');
            const content = document.getElementById('registerModalContent');
            content.classList.remove('modal-open'); content.classList.add('modal-closed');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 200);
        }

        // ======= ระบบโหลดข้อมูล Sheet =======
        function loadSupplierData() {
            const suppSel = document.getElementById('supplierSelect');
            suppSel.innerHTML = '<option value="">กำลังโหลดข้อมูล...</option>';
            suppSel.disabled = true;

            fetch(API_URL + "?action=getSupplierMaster")
                .then(res => res.json())
                .then(res => {
                    if (res.status === 'success' && res.data.length > 0) {
                        supplierDatabase = res.data;
                        initSupplierDropdown();
                    } else {
                        suppSel.innerHTML = '<option value="">ไม่พบข้อมูลในระบบ</option>';
                    }
                })
                .catch(err => {
                    suppSel.innerHTML = '<option value="">เกิดข้อผิดพลาดในการดึงข้อมูล</option>';
                });
        }

        function initSupplierDropdown() {
            const suppSel = document.getElementById('supplierSelect');
            suppSel.innerHTML = '<option value="">-- เลือกซัพพลายเออร์ --</option>';
            suppSel.disabled = false;
            
            supplierDatabase.forEach((supp, index) => {
                let option = document.createElement('option');
                option.value = index; 
                option.text = `[${supp.code}] ${supp.name}`;
                suppSel.appendChild(option);
            });
            document.getElementById('itemSelect').innerHTML = '<option value="">-- กรุณาเลือกซัพพลายเออร์ก่อน --</option>';
            document.getElementById('itemSelect').disabled = true;
        }

        function updateItems() {
            const suppSel = document.getElementById('supplierSelect');
            const itemSel = document.getElementById('itemSelect');
            itemSel.innerHTML = '<option value="">-- เลือกรายการสินค้า --</option>';
            
            if (suppSel.value === "") {
                itemSel.disabled = true;
                itemSel.innerHTML = '<option value="">-- กรุณาเลือกซัพพลายเออร์ก่อน --</option>';
                return;
            }

            itemSel.disabled = false;
            const selectedSupplier = supplierDatabase[suppSel.value];
            
            selectedSupplier.items.forEach(item => {
                let option = document.createElement('option');
                option.value = `[${item.code}] ${item.name}`;
                option.text = `[${item.code}] ${item.name}`;
                itemSel.appendChild(option);
            });
        }

        function loadNextWorkId() {
            const input = document.getElementById('workId');
            input.value = "กำลังดึงเลขที่...";
            
            fetch(API_URL + "?action=getNextWorkId")
                .then(res => res.json())
                .then(res => {
                    if (res.status === 'success') input.value = res.data;
                    else input.value = "Error";
                })
                .catch(err => input.value = "Error");
        }

        // ======= ระบบเพิ่มสินค้า (จาก Popup) =======
        function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById("btnSubmitReg");
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> กำลังบันทึก...';
            btn.disabled = true;

            const payload = {
                action: "registerSupplierItem",
                data: {
                    supplierName: document.getElementById('suppName').value,
                    supplierCode: document.getElementById('suppCode').value.toUpperCase(),
                    itemName: document.getElementById('itemName').value,
                    itemCode: document.getElementById('itemCode').value.toUpperCase()
                }
            };

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                if (res.status === 'success') {
                    alert(res.message);
                    document.getElementById('registerForm').reset();
                    closeRegisterModal();
                    loadSupplierData(); 
                } else {
                    alert("เกิดข้อผิดพลาด: " + res.message);
                }
            })
            .catch(err => alert("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้"))
            .finally(() => {
                btn.innerHTML = '<span class="material-symbols-outlined text-[20px]">save</span> บันทึกเข้าระบบ';
                btn.disabled = false;
            });
        }

        // ======= ระบบสร้างใบงานหลัก =======
        function handleCreateWorkOrder(e) {
            e.preventDefault();
            const btn = document.getElementById("btnSubmitWO");
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> กำลังบันทึก...';
            btn.disabled = true;

            const suppSel = document.getElementById('supplierSelect');
            const formattedSupplier = suppSel.options[suppSel.selectedIndex].text;

            // ในระบบหลังบ้านของเรา Limit คือตัวเลขที่จะเอาไปตั้งเป็นเป้าการสแกน (ฉะนั้นต้องใช้จำนวน "พาเลท")
            const limitStr = document.getElementById('targetLimit').value;
            const bagsPerPalletStr = document.getElementById('bagsPerPallet').value;
            
            const limit = parseInt(limitStr) || 0;
            const bagsPerPallet = parseInt(bagsPerPalletStr) || 1;
            const totalPalletsToScan = Math.ceil(limit / bagsPerPallet);

            const payload = {
                action: "createNewWorkOrder",
                data: {
                    workId: document.getElementById('workId').value,
                    workType: document.getElementById('workType').value,
                    itemRef: document.getElementById('itemSelect').value,
                    supplier: formattedSupplier,
                    targetLimit: totalPalletsToScan.toString(), // ส่งจำนวนพาเลทไปบันทึก
                    batchCount: document.getElementById('batchCount').value,
                    kgPerBag: document.getElementById('kgPerBag').value,
                    lotCode: document.getElementById('lotCode').value
                    // ถ้าในอนาคตต้องการเก็บยอดรวม (Total Bags) ด้วย อาจจะต้องแก้ Google Script เพื่อรับค่านี้เพิ่มครับ
                }
            };

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                if (res.status === 'success') {
                    alert(res.message);
                    document.getElementById('createWorkOrderForm').reset();
                    document.getElementById('itemSelect').disabled = true;
                    document.getElementById('itemSelect').innerHTML = '<option value="">-- กรุณาเลือกซัพพลายเออร์ก่อน --</option>';
                    document.getElementById('calcResult').innerHTML = `จะสร้างใบงานที่ต้องสแกนทั้งหมด: <span class="text-lg">0</span> พาเลท`;
                    loadNextWorkId(); 
                } else {
                    alert("เกิดข้อผิดพลาด: " + res.message);
                }
            })
            .catch(err => alert("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้"))
            .finally(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">add_task</span> ยืนยันสร้างใบงาน';
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
